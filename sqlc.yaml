version: "2"
sql:
  - engine: "postgresql"
    queries: "storage/postgres/db/queries"
    schema: "storage/postgres/db/migrations"
    gen:
      go:
        out: "storage/postgres/db"
        package: "pg"
        sql_package: "pgx/v5"
  - engine: "sqlite"
    queries: "storage/sqlite/db/queries"
    schema: "storage/sqlite/db/migrations"
    gen:
      go:
        out: "storage/sqlite/db"
        package: "sqli"
